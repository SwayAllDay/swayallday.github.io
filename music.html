<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Music | ZOYA</title>

  <link rel="icon" type="image/jpeg" href="favicon.jpg" />
  <link rel="stylesheet" href="style.css?v=21" />
</head>

<body>

<header class="navbar page-navbar">
  <a href="index.html" class="nav-logo">ZOYA</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="merch.html">Merch</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
    <a href="demo.html">Send Promo / Demo</a>
  </nav>
</header>

<main class="music-only-page">

  <section class="spotlight-carousel">

    <button
      class="spotlight-card music-popup-trigger"
      data-title="Future Calling"
      data-cover="future-calling-cover.jpg"
      data-spotify="https://open.spotify.com/album/05Vgzjo5gCiwtsOsPlGKlX"
      data-apple="https://music.apple.com/us/album/future-calling-single/1892638294"
      data-ytmusic="https://music.youtube.com/playlist?list=OLAK5uy_kmJlGhOe0Zeo6JOWLLvvSXxICECLiL5uY"
      data-youtube="https://www.youtube.com/watch?v=QMuRjXK3wjE"
    >
      <div class="cover-wrap">
        <img src="future-calling-cover.jpg" alt="Future Calling cover">
      </div>
      <h2>Future Calling</h2>
    </button>

    <button
      class="spotlight-card latest-release music-popup-trigger"
      data-title="Fever In The Silence"
      data-cover="fever-cover.jpg"
      data-spotify="https://open.spotify.com/album/5iY94mIB3V9gATZgvKHkG9"
      data-apple="https://music.apple.com/us/album/fever-in-the-silence-single/1896127153"
      data-ytmusic="https://music.youtube.com/playlist?list=OLAK5uy_k59aXwHclSzy4fE4nGemvhF91t-cYEYwE"
      data-youtube="https://www.youtube.com/watch?v=QpRA4A5abNM"
    >
      <div class="release-badge">Latest Release</div>
      <div class="cover-wrap">
        <img src="fever-cover.jpg" alt="Fever In The Silence cover">
      </div>
      <h2>Fever In The Silence</h2>
    </button>

    <button
      class="spotlight-card music-popup-trigger"
      data-title="Living The Moment"
      data-cover="living-the-moment-cover.jpg"
      data-spotify="https://open.spotify.com/album/1mcijQwtuSLidVApZXz1sT"
      data-apple="https://music.apple.com/us/album/living-the-moment-single/1880672318"
      data-ytmusic="https://music.youtube.com/playlist?list=OLAK5uy_nxwbLGqWkwZVUeOR7t162--I_op904aaU"
      data-youtube="https://www.youtube.com/watch?v=LZ2X_pGdyt4"
    >
      <div class="cover-wrap">
        <img src="living-the-moment-cover.jpg" alt="Living The Moment cover">
      </div>
      <h2>Living The Moment</h2>
    </button>

  </section>

</main>

<div class="listen-popup" id="listenPopup">

  <div class="listen-popup-box">

    <button class="listen-close" id="closeListenPopup">×</button>

    <div class="listen-cover">
      <img id="popupCover" src="" alt="">
    </div>

    <h2 id="popupTitle"></h2>
    <p>ZOYA</p>

    <h3>Listen On</h3>

    <div class="listen-grid">

      <a id="popupSpotify" target="_blank">Spotify</a>
      <a id="popupApple" target="_blank">Apple Music</a>
      <a id="popupYTMusic" target="_blank">YouTube Music</a>
      <a id="popupYouTube" target="_blank">YouTube</a>

    </div>

  </div>

</div>

<script src="main.js"></script>
<script src="cookies.js"></script>

</body>
</html>
