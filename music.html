<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music | ZOYA</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="navbar page-navbar">
  <a href="index.html" class="nav-logo">ZOYA</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="merch.html">Merch</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>

  </nav>
</header>

<main class="music-only-page">

  <section class="music-hero-title">
    <h1>Explore the newest music from ZOYA</h1>
  </section>

  <section class="spotlight-carousel">

    <article class="spotlight-card side-card">
      <div class="cover-wrap">
        <img src="future-calling-cover.jpg" alt="Future Calling cover">
      </div>

      <h2>Future Calling</h2>

      <div class="spotify-frame">
        <iframe
          src="https://open.spotify.com/embed/album/05Vgzjo5gCiwtsOsPlGKlX?utm_source=generator"
          width="100%"
          height="80"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </article>

    <article class="spotlight-card main-card">
      <div class="release-badge">Latest Release</div>

      <div class="cover-wrap">
        <img src="fever-cover.jpg" alt="Fever In The Silence cover">
      </div>

      <h2>Fever In The Silence</h2>

      <div class="spotify-frame">
        <iframe
          src="https://open.spotify.com/embed/album/5iY94mIB3V9gATZgvKHkG9?utm_source=generator"
          width="100%"
          height="80"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </article>

    <article class="spotlight-card side-card">
      <div class="cover-wrap">
        <img src="living-the-moment-cover.jpg" alt="Living The Moment cover">
      </div>

      <h2>Living The Moment</h2>

      <div class="spotify-frame">
        <iframe
          src="https://open.spotify.com/embed/album/1mcijQwtuSLidVApZXz1sT?utm_source=generator"
          width="100%"
          height="80"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </article>

  </section>

</main>

</body>
</html>
